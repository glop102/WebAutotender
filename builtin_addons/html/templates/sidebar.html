<div id="sidebar"
     hx-get="/ui/sidebar"
     hx-trigger="refresh"
     hx-target="#sidebar"
     hx-swap="outerHTML">
  <h2>Workflows</h2>
  {% for wf in workflows %}
  <div class="sidebar-workflow {% if selected_uuid == wf.uuid %}active{% endif %}"
       hx-get="/ui/workflow/{{ wf.uuid }}"
       hx-target="#right-pane"
       hx-swap="innerHTML">
    <button class="toggle-btn"
            hx-post="/ui/workflow/{{ wf.uuid }}/toggle_pause"
            hx-target="#sidebar"
            hx-swap="outerHTML"
            hx-include="this"
            onclick="event.stopPropagation()"
            title="{% if wf.state.name == 'Running' %}Pause{% else %}Resume{% endif %}">
      {% if wf.state.name == 'Running' %}⏸{% else %}▶{% endif %}
    </button>
    <span class="wf-name">{{ wf.name or '(Untitled)' }}</span>
  </div>
  {% endfor %}

  <button id="add-workflow-btn"
          hx-post="/ui/workflow/add"
          hx-target="#right-pane"
          hx-swap="innerHTML">+ Add Workflow</button>

  <hr class="sidebar-divider">

  <div class="sidebar-globals {% if selected_uuid == '__globals__' %}active{% endif %}"
       hx-get="/ui/globals"
       hx-target="#right-pane"
       hx-swap="innerHTML">
    Global Variables{% if globals_dirty %} *{% endif %}
  </div>

  <div class="sidebar-globals {% if selected_uuid == '__secrets__' %}active{% endif %}"
       hx-get="/ui/secrets"
       hx-target="#right-pane"
       hx-swap="innerHTML">
    Secrets{% if secrets_dirty %} *{% endif %}
  </div>
</div>
