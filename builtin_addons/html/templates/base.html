<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAutotender</title>
  <script src="/ui/static/htmx.min.js"></script>
  <script src="/ui/static/sortable.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; height: 100vh; font-family: sans-serif; font-size: 0.875rem; background: #1e1e1e; color: #ccc; }

    /* Sidebar */
    #sidebar { width: 13.75rem; min-width: 13.75rem; background: #252526; border-right: 1px solid #333; display: flex; flex-direction: column; overflow-y: auto; }
    #sidebar h2 { padding: 0.75rem; font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 1px; color: #888; border-bottom: 1px solid #333; }
    .sidebar-workflow { display: flex; align-items: center; gap: 0.25rem; padding: 0.25rem 0.5rem; cursor: pointer; border-radius: 0.25rem; margin: 0.125rem 0.375rem; }
    .sidebar-workflow:hover { background: #2d2d2d; }
    .sidebar-workflow.active { background: #094771; color: #fff; }
    .sidebar-workflow .wf-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0.125rem 0; }
    .sidebar-workflow .toggle-btn { background: none; border: none; color: inherit; cursor: pointer; padding: 0.125rem 0.25rem; font-size: 1rem; line-height: 1; flex-shrink: 0; }
    .sidebar-workflow .toggle-btn:hover { color: #fff; }
    .sidebar-divider { border: none; border-top: 1px solid #333; margin: 0.375rem; }
    .sidebar-globals { display: flex; align-items: center; padding: 0.375rem 0.75rem; cursor: pointer; border-radius: 0.25rem; margin: 0.125rem 0.375rem; }
    .sidebar-globals:hover { background: #2d2d2d; }
    .sidebar-globals.active { background: #094771; color: #fff; }
    #add-workflow-btn { margin: 0.375rem; padding: 0.375rem; background: #333; border: 1px solid #444; color: #ccc; border-radius: 0.25rem; cursor: pointer; width: calc(100% - 0.75rem); text-align: center; }
    #add-workflow-btn:hover { background: #3c3c3c; }

    /* Right pane */
    #right-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #right-pane-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #555; }

    /* Tab bar */
    #tab-bar { display: flex; border-bottom: 1px solid #333; background: #252526; padding: 0 0.5rem; flex-shrink: 0; }
    .tab-btn { padding: 0.5rem 1rem; border: none; background: none; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab-btn:hover { color: #ccc; }
    .tab-btn.active { color: #fff; border-bottom-color: #007acc; }

    /* Tab content */
    #tab-content { flex: 1; overflow-y: auto; padding: 1rem; }

    /* Sections */
    .section { margin-bottom: 1.5rem; }
    .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 0.5rem; border-bottom: 1px solid #333; padding-bottom: 0.25rem; }

    /* Forms / inputs */
    input[type=text], input[type=url], input[type=number], textarea, select {
      background: #3c3c3c; border: 1px solid #555; color: #ccc; padding: 0.25rem 0.5rem; border-radius: 0.1875rem; font-size: 0.8125rem;
    }
    input[type=text]:focus, input[type=url]:focus, input[type=number]:focus, textarea:focus, select:focus {
      outline: none; border-color: #007acc;
    }
    textarea { resize: vertical; width: 100%; }
    label { color: #aaa; font-size: 0.75rem; }

    /* Buttons */
    .btn { padding: 0.25rem 0.625rem; border-radius: 0.1875rem; border: 1px solid #555; background: #3c3c3c; color: #ccc; cursor: pointer; font-size: 0.8125rem; }
    .btn:hover { background: #4a4a4a; }
    .btn-primary { background: #0e639c; border-color: #0e639c; color: #fff; }
    .btn-primary:hover { background: #1177bb; }
    .btn-danger { background: #8b0000; border-color: #8b0000; color: #fff; }
    .btn-danger:hover { background: #a00000; }
    .btn-sm { padding: 0.125rem 0.375rem; font-size: 0.75rem; }

    /* Variable rows */
    .var-row { display: flex; align-items: center; gap: 0.375rem; margin: 0.25rem 0; padding: 0.25rem 0; }
    .var-name { font-family: monospace; color: #9cdcfe; min-width: 7.5rem; }
    .var-name-edit { font-family: monospace; color: #9cdcfe; width: 7rem; }
    .vn-pencil { opacity: 0.35; padding: 0 0.2rem; }
    .vn-pencil:hover { opacity: 1; }
    .var-type-select { min-width: 6.875rem; }
    .var-input { flex: 1; }
    .var-container { border-left: 2px solid #444; margin-left: 0.75rem; padding-left: 0.5rem; margin-top: 0.25rem; }

    /* Instance rows */
    .instance-details { border: 1px solid #333; border-radius: 0.25rem; margin: 0.375rem 0; }
    .instance-details summary { padding: 0.375rem 0.625rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; list-style: none; }
    .instance-details summary::-webkit-details-marker { display: none; }
    .instance-details summary:hover { background: #2a2a2a; }
    .instance-body { padding: 0.625rem; border-top: 1px solid #333; }
    .state-running { color: #4ec9b0; }
    .state-paused  { color: #dcdcaa; }
    .state-error   { color: #f44747; }
    .instance-meta { font-size: 0.75rem; color: #888; margin: 0 0.25rem; }

    /* Procedure sections */
    .procedure-section { border: 1px solid #333; border-radius: 0.25rem; margin-bottom: 0.75rem; }
    .procedure-header { display: flex; align-items: center; gap: 0.375rem; padding: 0.375rem 0.625rem; background: #2d2d2d; border-radius: 0.25rem 0.25rem 0 0; }
    .procedure-name-view { display: flex; align-items: center; gap: 0.375rem; flex: 1; }
    .procedure-name-edit { display: none; align-items: center; gap: 0.375rem; flex: 1; }
    .procedure-name-span { font-weight: bold; font-family: monospace; color: #ce9178; }
    .step-list { padding: 0.375rem; }
    .step-row { display: flex; flex-direction: column; gap: 0.25rem; border: 1px solid #3a3a3a; border-radius: 0.1875rem; padding: 0.375rem; margin: 0.25rem 0; background: #2a2a2a; }
    .step-row-header { display: flex; align-items: center; gap: 0.375rem; }
    .step-drag-handle { cursor: grab; color: #555; font-size: 1rem; user-select: none; }
    .var-drag-handle  { cursor: grab; color: #555; font-size: 1rem; user-select: none; }
    .step-args { margin-left: 1.5rem; }
    .arg-row { display: flex; align-items: center; gap: 0.375rem; margin: 0.1875rem 0; }
    .arg-label { min-width: 6.25rem; font-family: monospace; font-size: 0.75rem; color: #9cdcfe; }

    /* Notes details */
    .notes-details { border: 1px solid #333; border-radius: 0.25rem; margin-bottom: 0.75rem; }
    .notes-details summary { padding: 0.375rem 0.625rem; cursor: pointer; color: #888; font-size: 0.75rem; }
    .notes-details pre { padding: 0.5rem 0.625rem; white-space: pre-wrap; font-size: 0.75rem; color: #aaa; border-top: 1px solid #333; }

    /* Console log */
    .console-log { background: #111; border: 1px solid #333; border-radius: 0.1875rem; padding: 0.5rem; font-family: monospace; font-size: 0.75rem; line-height: 1.4; white-space: pre-wrap; height: calc(20 * 1.4em); overflow: auto; resize: vertical; color: #aaa; }

    /* Bottom action bar */
    .action-bar { display: flex; gap: 0.5rem; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #333; }

    /* Pane title / description text */
    .pane-title { margin-bottom: 0.75rem; }
    .pane-description { color: #888; font-size: 0.6875rem; margin-bottom: 0.75rem; }

    /* Empty / placeholder list messages */
    .empty-state { color: #888; font-size: 0.75rem; }

    /* Flex helpers */
    .flex-spacer { flex: 1; }
    .var-row-top { align-items: flex-start; }

    /* Variable rename edit group — hidden until rename mode */
    .vn-edit-group { display: none; align-items: center; gap: 0.125rem; }

    /* Instance body sub-section spacing */
    .instance-body .section-title { margin-top: 0.5rem; }
    .instance-vars { margin-top: 0.5rem; }

    /* Spawn button bar */
    .spawn-bar { margin-bottom: 0.625rem; }

    /* Procedure step footer (add-step button area) */
    .step-footer { padding: 0.25rem 0.375rem; }

    /* Pointer cursor on all collapsible summaries */
    summary { cursor: pointer; }

    /* Toast */
    #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #5a1a1a; border: 1px solid #f44747; color: #f44747; padding: 0.625rem 1rem; border-radius: 0.25rem; z-index: 9998; display: flex; align-items: center; gap: 0.625rem; }

    /* Offline overlay */
    #offline-overlay { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.75); align-items: center; justify-content: center; pointer-events: auto; }
    #offline-overlay p { color: white; font-size: 1.5rem; }

    /* Modal */
    #spawn-modal { position: fixed; inset: 0; z-index: 9990; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #252526; border: 1px solid #444; border-radius: 0.375rem; padding: 1.25rem; min-width: 22.5rem; max-width: 37.5rem; max-height: 80vh; overflow-y: auto; }
    .modal-box h3 { margin-bottom: 0.75rem; }
    .modal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: flex-end; }
  </style>
</head>
<body>

<div id="sidebar"
     hx-get="/ui/sidebar"
     hx-trigger="refresh"
     hx-target="#sidebar"
     hx-swap="outerHTML">
  {% include "sidebar.html" %}
</div>

<div id="right-pane">
  <div id="right-pane-empty">Select a workflow from the sidebar</div>
</div>

<div id="offline-overlay">
  <p>Server is offline</p>
</div>

<script>
// Variable rename helpers
function startRename(btn) {
    const row = btn.closest('.var-row');
    row.querySelector('[data-varname]').style.display = 'none';
    btn.style.display = 'none';
    const group = row.querySelector('.vn-edit-group');
    group.style.display = 'flex';
    const input = group.querySelector('input');
    input.focus();
    input.select();
}
function cancelRename(el) {
    const row = el.closest('.var-row');
    row.querySelector('[data-varname]').style.display = '';
    row.querySelector('.vn-pencil').style.display = '';
    row.querySelector('.vn-edit-group').style.display = 'none';
}
function commitRename(el) {
    const row = el.closest('.var-row');
    const label = row.querySelector('[data-varname]');
    const input = row.querySelector('.vn-edit-group input');
    const oldName = label.dataset.varname;
    const newName = input.value.trim();
    if (!newName || newName === oldName) { cancelRename(el); return; }
    const vals = { old_name: oldName, new_name: newName };
    if (label.dataset.section) vals.section = label.dataset.section;
    htmx.ajax('POST', label.dataset.renameEp, {
        target: label.dataset.target,
        swap: label.dataset.swap,
        values: vals
    });
}
function handleRenameKey(evt, input) {
    if (evt.key === 'Enter')  { evt.preventDefault(); commitRename(input); }
    if (evt.key === 'Escape') { cancelRename(input); }
}

// SSE
const _sse = new EventSource('/ui/events');
_sse.addEventListener('RefreshInstance', e => {
    const container = document.getElementById('instances-' + e.data);
    if (container) htmx.trigger(container, 'refresh');
});
_sse.addEventListener('RefreshWorkflows', e => {
    htmx.trigger(document.getElementById('sidebar'), 'refresh');
});
_sse.addEventListener('ClosingDown', () => {
    document.getElementById('offline-overlay').style.display = 'flex';
});
_sse.onerror = () => {
    document.getElementById('offline-overlay').style.display = 'flex';
};

// Preserve open <details> across HTMX swaps
let _openDetails = new Set();
document.addEventListener('htmx:beforeSwap', () => {
    _openDetails = new Set(
        [...document.querySelectorAll('details[open]')].map(d => d.id).filter(Boolean)
    );
});
document.addEventListener('htmx:afterSwap', () => {
    for (const id of _openDetails) {
        const el = document.getElementById(id);
        if (el) el.open = true;
    }
    initSortable();
    scrollConsoleLogs();
});

function scrollConsoleLogs() {
    document.querySelectorAll('.console-log').forEach(el => { el.scrollTop = el.scrollHeight; });
}
scrollConsoleLogs();

// Sortable.js for procedure step reordering
function initSortable() {
    document.querySelectorAll('.step-list').forEach(el => {
        if (el._sortable) el._sortable.destroy();
        el._sortable = Sortable.create(el, {
            handle: '.step-drag-handle',
            animation: 150,
            onEnd(evt) {
                const order = [...evt.from.querySelectorAll('[data-step-idx]')]
                    .map(row => row.dataset.stepIdx);
                const url = evt.from.dataset.reorderUrl;
                htmx.ajax('POST', url, {
                    target: evt.from.closest('.procedure-section'),
                    swap: 'outerHTML',
                    values: { proc_name: evt.from.dataset.procName, order: JSON.stringify(order) }
                });
            }
        });
    });

    document.querySelectorAll('.var-list-sortable').forEach(el => {
        if (el._sortable) el._sortable.destroy();
        el._sortable = Sortable.create(el, {
            handle: '.var-drag-handle',
            animation: 150,
            onEnd(evt) {
                const order = [...evt.from.querySelectorAll(':scope > [data-idx]')]
                    .map(row => row.dataset.idx);
                const url = evt.from.dataset.reorderUrl;
                if (!url) return;
                htmx.ajax('POST', url, {
                    target: evt.from.dataset.target,
                    swap: evt.from.dataset.swap,
                    values: {
                        var_name: evt.from.dataset.varName,
                        path: evt.from.dataset.path,
                        order: JSON.stringify(order),
                        section: evt.from.dataset.section || ''
                    }
                });
            }
        });
    });
}
initSortable();
</script>
</body>
</html>
