<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAutotender</title>
  <script src="/ui/static/htmx.min.js"></script>
  <script src="/ui/static/sortable.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; height: 100vh; font-family: sans-serif; font-size: 14px; background: #1e1e1e; color: #ccc; }

    /* Sidebar */
    #sidebar { width: 220px; min-width: 220px; background: #252526; border-right: 1px solid #333; display: flex; flex-direction: column; overflow-y: auto; }
    #sidebar h2 { padding: 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; border-bottom: 1px solid #333; }
    .sidebar-workflow { display: flex; align-items: center; gap: 4px; padding: 4px 8px; cursor: pointer; border-radius: 4px; margin: 2px 6px; }
    .sidebar-workflow:hover { background: #2d2d2d; }
    .sidebar-workflow.active { background: #094771; color: #fff; }
    .sidebar-workflow .wf-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 2px 0; }
    .sidebar-workflow .toggle-btn { background: none; border: none; color: inherit; cursor: pointer; padding: 2px 4px; font-size: 16px; line-height: 1; flex-shrink: 0; }
    .sidebar-workflow .toggle-btn:hover { color: #fff; }
    .sidebar-divider { border: none; border-top: 1px solid #333; margin: 6px; }
    .sidebar-globals { display: flex; align-items: center; padding: 6px 12px; cursor: pointer; border-radius: 4px; margin: 2px 6px; }
    .sidebar-globals:hover { background: #2d2d2d; }
    .sidebar-globals.active { background: #094771; color: #fff; }
    #add-workflow-btn { margin: 6px; padding: 6px; background: #333; border: 1px solid #444; color: #ccc; border-radius: 4px; cursor: pointer; width: calc(100% - 12px); text-align: center; }
    #add-workflow-btn:hover { background: #3c3c3c; }

    /* Right pane */
    #right-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #right-pane-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #555; }

    /* Tab bar */
    #tab-bar { display: flex; border-bottom: 1px solid #333; background: #252526; padding: 0 8px; flex-shrink: 0; }
    .tab-btn { padding: 8px 16px; border: none; background: none; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab-btn:hover { color: #ccc; }
    .tab-btn.active { color: #fff; border-bottom-color: #007acc; }

    /* Tab content */
    #tab-content { flex: 1; overflow-y: auto; padding: 16px; }

    /* Sections */
    .section { margin-bottom: 24px; }
    .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }

    /* Forms / inputs */
    input[type=text], input[type=url], input[type=number], textarea, select {
      background: #3c3c3c; border: 1px solid #555; color: #ccc; padding: 4px 8px; border-radius: 3px; font-size: 13px;
    }
    input[type=text]:focus, input[type=url]:focus, input[type=number]:focus, textarea:focus, select:focus {
      outline: none; border-color: #007acc;
    }
    textarea { resize: vertical; width: 100%; }
    label { color: #aaa; font-size: 12px; }

    /* Buttons */
    .btn { padding: 4px 10px; border-radius: 3px; border: 1px solid #555; background: #3c3c3c; color: #ccc; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #4a4a4a; }
    .btn-primary { background: #0e639c; border-color: #0e639c; color: #fff; }
    .btn-primary:hover { background: #1177bb; }
    .btn-danger { background: #8b0000; border-color: #8b0000; color: #fff; }
    .btn-danger:hover { background: #a00000; }
    .btn-sm { padding: 2px 6px; font-size: 12px; }

    /* Variable rows */
    .var-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; padding: 4px 0; }
    .var-name { font-family: monospace; color: #9cdcfe; min-width: 120px; }
    .var-type-select { min-width: 110px; }
    .var-input { flex: 1; }
    .var-container { border-left: 2px solid #444; margin-left: 12px; padding-left: 8px; margin-top: 4px; }

    /* Instance rows */
    .instance-details { border: 1px solid #333; border-radius: 4px; margin: 6px 0; }
    .instance-details summary { padding: 6px 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; list-style: none; }
    .instance-details summary::-webkit-details-marker { display: none; }
    .instance-details summary:hover { background: #2a2a2a; }
    .instance-body { padding: 10px; border-top: 1px solid #333; }
    .state-running { color: #4ec9b0; }
    .state-paused  { color: #dcdcaa; }
    .state-error   { color: #f44747; }
    .instance-meta { font-size: 12px; color: #888; margin: 0 4px; }

    /* Procedure sections */
    .procedure-section { border: 1px solid #333; border-radius: 4px; margin-bottom: 12px; }
    .procedure-header { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: #2d2d2d; border-radius: 4px 4px 0 0; }
    .procedure-name-view { display: flex; align-items: center; gap: 6px; flex: 1; }
    .procedure-name-edit { display: none; align-items: center; gap: 6px; flex: 1; }
    .procedure-name-span { font-weight: bold; font-family: monospace; color: #ce9178; }
    .step-list { padding: 6px; }
    .step-row { display: flex; flex-direction: column; gap: 4px; border: 1px solid #3a3a3a; border-radius: 3px; padding: 6px; margin: 4px 0; background: #2a2a2a; }
    .step-row-header { display: flex; align-items: center; gap: 6px; }
    .step-drag-handle { cursor: grab; color: #555; font-size: 16px; user-select: none; }
    .step-args { margin-left: 24px; }
    .arg-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .arg-label { min-width: 100px; font-family: monospace; font-size: 12px; color: #9cdcfe; }

    /* Notes details */
    .notes-details { border: 1px solid #333; border-radius: 4px; margin-bottom: 12px; }
    .notes-details summary { padding: 6px 10px; cursor: pointer; color: #888; font-size: 12px; }
    .notes-details pre { padding: 8px 10px; white-space: pre-wrap; font-size: 12px; color: #aaa; border-top: 1px solid #333; }

    /* Console log */
    .console-log { background: #111; border: 1px solid #333; border-radius: 3px; padding: 8px; font-family: monospace; font-size: 12px; line-height: 1.4; white-space: pre-wrap; height: calc(20 * 1.4em); overflow: auto; color: #aaa; }

    /* Bottom action bar */
    .action-bar { display: flex; gap: 8px; margin-top: 16px; padding-top: 12px; border-top: 1px solid #333; }

    /* Toast */
    #toast { position: fixed; bottom: 24px; right: 24px; background: #5a1a1a; border: 1px solid #f44747; color: #f44747; padding: 10px 16px; border-radius: 4px; z-index: 9998; display: flex; align-items: center; gap: 10px; }

    /* Offline overlay */
    #offline-overlay { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.75); align-items: center; justify-content: center; pointer-events: auto; }
    #offline-overlay p { color: white; font-size: 1.5rem; }

    /* Modal */
    #spawn-modal { position: fixed; inset: 0; z-index: 9990; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #252526; border: 1px solid #444; border-radius: 6px; padding: 20px; min-width: 360px; max-width: 600px; max-height: 80vh; overflow-y: auto; }
    .modal-box h3 { margin-bottom: 12px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  </style>
</head>
<body>

<div id="sidebar"
     hx-get="/ui/sidebar"
     hx-trigger="refresh"
     hx-target="#sidebar"
     hx-swap="outerHTML">
  {% include "sidebar.html" %}
</div>

<div id="right-pane">
  <div id="right-pane-empty">Select a workflow from the sidebar</div>
</div>

<div id="offline-overlay">
  <p>Server is offline</p>
</div>

<script>
// SSE
const _sse = new EventSource('/ui/events');
_sse.addEventListener('RefreshInstance', e => {
    const container = document.getElementById('instances-' + e.data);
    if (container) htmx.trigger(container, 'refresh');
});
_sse.addEventListener('RefreshWorkflows', e => {
    htmx.trigger(document.getElementById('sidebar'), 'refresh');
});
_sse.addEventListener('ClosingDown', () => {
    document.getElementById('offline-overlay').style.display = 'flex';
});
_sse.onerror = () => {
    document.getElementById('offline-overlay').style.display = 'flex';
};

// Preserve open <details> across HTMX swaps
let _openDetails = new Set();
document.addEventListener('htmx:beforeSwap', () => {
    _openDetails = new Set(
        [...document.querySelectorAll('details[open]')].map(d => d.id).filter(Boolean)
    );
});
document.addEventListener('htmx:afterSwap', () => {
    for (const id of _openDetails) {
        const el = document.getElementById(id);
        if (el) el.open = true;
    }
    initSortable();
});

// Sortable.js for procedure step reordering
function initSortable() {
    document.querySelectorAll('.step-list').forEach(el => {
        if (el._sortable) el._sortable.destroy();
        el._sortable = Sortable.create(el, {
            handle: '.step-drag-handle',
            animation: 150,
            onEnd(evt) {
                const order = [...evt.from.querySelectorAll('[data-step-idx]')]
                    .map(row => row.dataset.stepIdx);
                const url = evt.from.dataset.reorderUrl;
                htmx.ajax('POST', url, {
                    target: evt.from.closest('.procedure-section'),
                    swap: 'outerHTML',
                    values: { proc_name: evt.from.dataset.procName, order: JSON.stringify(order) }
                });
            }
        });
    });
}
initSortable();
</script>
</body>
</html>
